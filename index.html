<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Nexus Shop · Pay for slides</title>
  <link rel="stylesheet" href="style.css">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">
      <h1><i class="fas fa-store"></i> Nexus Shop</h1>
      <p>Pay for slides</p>
    </div>
    <div class="theme-toggle" id="themeToggle">
      <i class="fas fa-sun"></i>/<i class="fas fa-moon"></i> <span id="themeText">Sáng</span>
    </div>
  </div>

  <!-- Đăng nhập / Đăng ký -->
  <div id="loginCard" class="card">
    <h2><i class="fas fa-sign-in-alt"></i> Đăng nhập / Đăng ký</h2>
    <input type="email" id="loginEmail" placeholder="Email" autocomplete="email">
    <input type="password" id="loginPassword" placeholder="Mật khẩu">
    <div class="flex">
      <button id="loginBtn"><i class="fas fa-key"></i> Đăng nhập</button>
      <button id="registerBtn" class="secondary"><i class="fas fa-user-plus"></i> Đăng ký</button>
    </div>
    <div style="text-align: center; margin: 1rem 0; position: relative;">
      <hr style="border: none; border-top: 1px solid var(--border);">
      <span style="position: relative; top: -0.7rem; background: var(--surface); padding: 0 1rem; color: var(--text-secondary);">Hoặc</span>
    </div>
    <button id="googleSignInBtn" style="background: #db4437; width: 100%;">
      <i class="fab fa-google"></i> Đăng nhập bằng Google
    </button>
  </div>

  <!-- Nội dung chính sau login -->
  <div id="appContent" style="display: none;">
    <div class="flex" style="justify-content: space-between; margin-bottom: 1rem;">
      <button id="backToHomeBtn" class="secondary"><i class="fas fa-arrow-left"></i> Về trang chủ</button>
      <span id="userEmailBadge" class="badge"></span>
    </div>

    <!-- Trang danh sách campaign -->
    <div id="homeView">
      <div class="card">
        <h2><i class="fas fa-list"></i> Các bài thuyết trình đang gây quỹ</h2>
        <div id="campaignsList" class="campaigns-grid"></div>
      </div>
    </div>

    <!-- Trang chi tiết campaign -->
    <div id="campaignDetailView" style="display: none;">
      <div class="card" id="campaignDetailCard"></div>
    </div>

    <!-- Admin Panel (chỉ st163943@gmail.com) -->
    <div id="adminPanel" class="admin-panel" style="display: none;">
      <div class="card">
        <h3><i class="fas fa-tools"></i> Quản trị Shop</h3>
        <button id="showAddCampaignBtn" class="secondary"><i class="fas fa-plus"></i> Thêm campaign mới</button>
        <div id="adminCampaignsList" style="margin-top: 1rem;"></div>
      </div>
      <!-- Form thêm campaign -->
      <div id="addCampaignForm" class="card" style="display: none;">
        <h4>Thêm bài thuyết trình mới</h4>
        <input type="text" id="newCampName" placeholder="Tên bài thuyết trình">
        <textarea id="newCampDesc" placeholder="Mô tả ngắn" rows="2"></textarea>
        <input type="number" id="newCampTarget" placeholder="Mục tiêu (VNĐ)">
        <input type="text" id="newCampLink" placeholder="Link tải file (Google Drive/Canva)">
        <div class="flex">
          <button id="confirmAddCampaignBtn">Thêm</button>
          <button id="cancelAddCampaignBtn" class="secondary">Hủy</button>
        </div>
      </div>
    </div>

    <button id="logoutBtn" class="secondary" style="width: 100%; margin-top: 1rem;"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
  </div>

  <!-- Footer quảng cáo -->
  <div class="footer-ads">
    <p><i class="fas fa-ad"></i> Quảng cáo của bạn ở đây — <a href="#">Liên hệ đặt banner</a></p>
  </div>
</div>

<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
